<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NutriGA // Creative Nutrition Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              zinc: { 950: "#09090b" },
              accent: "#bef264",
              "accent-dark": "#a3e635",
            },
            fontFamily: {
              sans: ["Outfit", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
          },
        },
      };
    </script>
    <style>
      body { background-color: #09090b; color: #a1a1aa; font-family: 'Outfit', sans-serif; }
      .brutal-border { border: 2px solid #27272a; box-shadow: 4px 4px 0px 0px #27272a; }
      .brutal-border-accent { border: 2px solid #bef264; box-shadow: 6px 6px 0px 0px #bef264; }
      .noise-bg {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        opacity: 0.03;
      }
    </style>
  </head>
  <body class="antialiased overflow-x-hidden selection:bg-accent selection:text-zinc-950 min-h-screen flex flex-col items-center justify-center p-6">
    <div class="fixed inset-0 noise-bg pointer-events-none z-50"></div>

    <div class="max-w-[1200px] w-full grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
        <div class="space-y-8">
          <div class="inline-block px-3 py-1 brutal-border text-[10px] font-mono text-accent uppercase tracking-widest bg-zinc-900/50">
            [ System: Nutritional_Optimization ]
          </div>
          <h1 class="text-6xl md:text-8xl font-extrabold text-zinc-100 tracking-tighter leading-none">NutriGA <br /><span class="text-accent italic">DIET AI</span>.</h1>
          <p class="text-zinc-400 leading-relaxed max-w-sm">
            An experimental implementation of a <span class="text-zinc-100">Genetic Algorithm</span> for personalized meal planning. Input your metrics, and let the evolution begin.
          </p>
          <div class="flex gap-4">
             <div class="px-3 py-1 brutal-border text-[10px] font-mono text-zinc-500 uppercase">Python</div>
             <div class="px-3 py-1 brutal-border text-[10px] font-mono text-zinc-500 uppercase">FastAPI</div>
             <div class="px-3 py-1 brutal-border text-[10px] font-mono text-zinc-500 uppercase">Genetic Alg</div>
          </div>
          <div class="pt-8">
            <a href="../../index.html" class="text-xs font-mono uppercase tracking-[0.4em] text-zinc-600 hover:text-accent transition-colors">
                _ Back to Portfolio
            </a>
          </div>
        </div>

        <div class="w-full">
            <div class="bg-zinc-950 brutal-border-accent p-8 md:p-12 relative">
                <div class="absolute -top-4 -right-4 bg-accent text-zinc-950 px-4 py-1 font-mono text-xs font-extrabold uppercase tracking-tighter rotate-3">
                  System Active
                </div>
                
                <form id="nutrition-form" class="space-y-8">
                  <div class="grid grid-cols-2 gap-8">
                    <div class="space-y-2">
                      <label class="text-[10px] font-mono uppercase tracking-widest text-zinc-500">Weight (kg)</label>
                      <input id="weight" type="number" placeholder="70" class="w-full bg-zinc-900 border-b-2 border-zinc-800 p-4 text-2xl font-bold text-accent focus:outline-none focus:border-accent transition-colors placeholder:opacity-20" required>
                    </div>
                    <div class="space-y-2">
                      <label class="text-[10px] font-mono uppercase tracking-widest text-zinc-500">Height (cm)</label>
                      <input id="height" type="number" placeholder="175" class="w-full bg-zinc-900 border-b-2 border-zinc-800 p-4 text-2xl font-bold text-accent focus:outline-none focus:border-accent transition-colors placeholder:opacity-20" required>
                    </div>
                  </div>

                  <div class="grid grid-cols-2 gap-8">
                    <div class="space-y-2">
                      <label class="text-[10px] font-mono uppercase tracking-widest text-zinc-500">Age</label>
                      <input id="age" type="number" placeholder="20" class="w-full bg-zinc-900 border-b-2 border-zinc-800 p-4 text-2xl font-bold text-accent focus:outline-none focus:border-accent transition-colors placeholder:opacity-20" required>
                    </div>
                    <div class="space-y-2">
                      <label class="text-[10px] font-mono uppercase tracking-widest text-zinc-500">Gender</label>
                      <select id="gender" class="w-full bg-zinc-900 border-b-2 border-zinc-800 p-4 text-xl font-bold text-accent focus:outline-none focus:border-accent transition-colors appearance-none">
                        <option value="male">MALE</option>
                        <option value="female">FEMALE</option>
                      </select>
                    </div>
                  </div>

                  <div class="space-y-4">
                    <label class="text-[10px] font-mono uppercase tracking-widest text-zinc-500">Activity Level</label>
                    <div id="activity-options" class="grid grid-cols-3 gap-2">
                      <button type="button" data-value="sedentary" class="activity-btn p-4 brutal-border text-[10px] font-bold uppercase tracking-tighter hover:bg-zinc-800 transition-colors">Sedentary</button>
                      <button type="button" data-value="moderate" class="activity-btn p-4 brutal-border-accent bg-accent text-zinc-950 text-[10px] font-bold uppercase tracking-tighter">Moderate</button>
                      <button type="button" data-value="active" class="activity-btn p-4 brutal-border text-[10px] font-bold uppercase tracking-tighter hover:bg-zinc-800 transition-colors">Athlete</button>
                    </div>
                    <input type="hidden" id="activity_level" value="moderate">
                  </div>

                  <button type="submit" id="run-optimization" class="w-full py-6 bg-zinc-100 text-zinc-950 font-extrabold uppercase tracking-[0.5em] hover:bg-accent transition-all group overflow-hidden relative">
                    <span class="relative z-10">Run Optimization</span>
                    <div class="absolute inset-0 bg-accent translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                  </button>
                </form>
            </div>
        </div>
    </div>

    <script>
      const activityBtns = document.querySelectorAll('.activity-btn');
      const activityInput = document.getElementById('activity_level');

      activityBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          activityBtns.forEach(b => {
            b.classList.remove('brutal-border-accent', 'bg-accent', 'text-zinc-950');
            b.classList.add('brutal-border');
          });
          btn.classList.add('brutal-border-accent', 'bg-accent', 'text-zinc-950');
          btn.classList.remove('brutal-border');
          activityInput.value = btn.dataset.value;
        });
      });

      document.getElementById('nutrition-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const payload = {
          weight: parseFloat(document.getElementById('weight').value),
          height: parseFloat(document.getElementById('height').value),
          age: parseInt(document.getElementById('age').value),
          gender: document.getElementById('gender').value,
          activity_level: activityInput.value
        };
        localStorage.setItem('nutrition_payload', JSON.stringify(payload));
        window.location.href = 'results.html';
      });
    </script>
  </body>
</html>
